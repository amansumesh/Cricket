apiVersion: apps/v1
kind: Deployment
metadata:
  name: cricket
  labels:
    app: cricket

spec:
  replicas: 2

  selector:
    matchLabels:
      app: cricket

  template:
    metadata:
      labels:
        app: cricket

    spec:
      containers:
        - name: cricket-container
          image: amansumesh/cricket:latest
          ports:
            - containerPort: 80

          resources:
            requests:
              memory: "64Mi"
              cpu: "250m"
            limits:
              memory: "128Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: cricket-service

spec:
  type: NodePort

  selector:
    app: cricket-app

  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30020
